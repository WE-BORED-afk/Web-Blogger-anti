<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Blogger - บล็อกส่วนตัวของฉัน</title>
    <meta name="description" content="พื้นที่แบ่งปันความคิด เรื่องราว และความรู้ของฉัน">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header / Profile Section -->
        <header id="profile-header">
            <div class="profile-avatar-container">
                <img id="author-avatar" src="assets/profile.png" alt="Profile" class="profile-avatar">
            </div>
            <div class="profile-info">
                <h1 id="author-name" class="profile-name" contenteditable="false">Advice</h1>
                <p id="author-bio" class="profile-bio" contenteditable="false">นักเขียนผู้หลงใหลในความเรียบง่าย การออกแบบเว็บ และเทคโนโลยีออร์แกนิก ยินดีต้อนรับสู่พื้นที่แบ่งปันความคิดและความเงียบสงบของฉัน</p>
                <div class="profile-socials">
                    <a id="author-github" href="https://github.com/WE-BORED-afk" target="_blank" class="social-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
                        GitHub
                    </a>
                </div>
                <!-- Profile Edit Panel (Hidden unless in Edit Mode) -->
                <div class="edit-panel" id="profile-edit-panel">
                    <div class="edit-field-group">
                        <label class="edit-label">ลิงก์รูปภาพโปรไฟล์ (Avatar URL):</label>
                        <input type="text" id="input-author-avatar" class="edit-input" placeholder="ใส่ลิงก์รูปภาพโปรไฟล์">
                    </div>
                    <div class="edit-field-group">
                        <label class="edit-label">ลิงก์ GitHub:</label>
                        <input type="text" id="input-author-github" class="edit-input" placeholder="ใส่ลิงก์ GitHub">
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Blog Feed -->
        <main id="blog-feed">
            <!-- Blog posts will be loaded here dynamically from app.js -->
        </main>

        <!-- Post Detail View -->
        <section id="post-detail-view" style="display: none;">
            <!-- Single blog post detail will be loaded here dynamically from app.js -->
        </section>
    </div>

    <!-- Floating Actions Bar -->
    <div class="action-bar">
        <button id="btn-toggle-edit" class="action-btn btn-edit-mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            <span>เปิดโหมดแก้ไข</span>
        </button>
        <button id="btn-add-post" class="action-btn btn-add-post">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            <span>เขียนโพสต์ใหม่</span>
        </button>
        <button id="btn-save" class="action-btn btn-save-export">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            <span>ส่งออกไฟล์ข้อมูล</span>
        </button>
        <button id="btn-cancel" class="action-btn btn-cancel">
            <span>ยกเลิก</span>
        </button>
    </div>

    <!-- Include posts data and logic script -->
    <script src="posts.js"></script>
    <script src="app.js"></script>
</body>
</html>
