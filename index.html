<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Blogger - บล็อกส่วนตัวของฉัน</title>
    <meta name="description" content="พื้นที่แบ่งปันความคิด เรื่องราว และความรู้ของฉัน">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Button (Top-Left Corner) -->
    <button id="btn-login" class="btn-login" title="เข้าสู่ระบบเพื่อแก้ไข">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
        <span>เข้าสู่ระบบ</span>
    </button>

    <div class="container">
        <!-- Header / Profile Section -->
        <header id="profile-header">
            <div class="profile-avatar-container">
                <img id="author-avatar" src="assets/profile.png" alt="Profile" class="profile-avatar">
            </div>
            <div class="profile-info">
                <h1 id="author-name" class="profile-name" contenteditable="false">Advice</h1>
                <p id="author-bio" class="profile-bio" contenteditable="false">นักเขียนผู้หลงใหลในความเรียบง่าย การออกแบบเว็บ และเทคโนโลยีออร์แกนิก ยินดีต้อนรับสู่พื้นที่แบ่งปันความคิดและความเงียบสงบของฉัน</p>

                <div class="edit-panel admin-only" id="profile-edit-panel">
                    <div class="edit-field-group">
                        <label class="edit-label">ลิงก์รูปภาพโปรไฟล์ (Avatar URL):</label>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <input type="text" id="input-author-avatar" class="edit-input" placeholder="ใส่ลิงก์รูปภาพโปรไฟล์ หรืออัปโหลด">
                            <label class="btn-upload-avatar">
                                📁 อัปโหลด
                                <input type="file" id="upload-author-avatar" accept="image/*" style="display: none;">
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Floating Edit Toggle Button (Top-Right Corner) -->
            <button id="btn-toggle-edit" class="fab-edit admin-only" title="เปิดโหมดแก้ไข">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            </button>

        </header>

        <!-- Main Blog Feed -->
        <main id="blog-feed">
            <!-- Blog posts will be loaded here dynamically from app.js -->
        </main>

        <!-- Post Detail View -->
        <section id="post-detail-view" style="display: none;">
            <!-- Single blog post detail will be loaded here dynamically from app.js -->
        </section>

        <!-- Post Editor View (Create / Edit) -->
        <section id="post-editor-view" style="display: none;">
            <!-- Post editor form will be loaded here dynamically from app.js -->
        </section>
    </div>

    <!-- Floating Bottom Toolbar (Edit Mode Only) -->
    <div class="action-bar admin-only" id="edit-toolbar">
        <button id="btn-save" class="action-btn btn-save-export">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            <span>บันทึกข้อมูล</span>
        </button>
        <button id="btn-cancel" class="action-btn btn-cancel">
            <span>ยกเลิก</span>
        </button>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 class="modal-title">🔑 เข้าสู่ระบบ</h2>
            <p class="modal-desc">กรอก Email และ Password เพื่อเข้าสู่โหมดแก้ไขบล็อก</p>
            
            <div class="edit-field-group">
                <label class="edit-label">Email:</label>
                <input type="email" id="login-email" class="edit-input" placeholder="email@example.com">
            </div>
            <div class="edit-field-group">
                <label class="edit-label">Password:</label>
                <input type="password" id="login-password" class="edit-input" placeholder="รหัสผ่าน">
            </div>
            
            <div class="modal-actions">
                <button id="btn-do-login" class="editor-btn editor-btn-save">เข้าสู่ระบบ</button>
                <button id="btn-close-login" class="editor-btn editor-btn-cancel">ปิด</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="modal-overlay" style="display: none;">
        <div class="loading-spinner-container">
            <div class="loading-spinner"></div>
            <p id="loading-text" style="color: white; margin-top: 1rem; font-family: 'Prompt', sans-serif;">กำลังโหลด...</p>
        </div>
    </div>

    <!-- Firebase SDK (Modular via CDN) -->
    <script type="module" src="app.js"></script>
</body>
</html>
